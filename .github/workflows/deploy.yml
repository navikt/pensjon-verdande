name: Build and deploy

permissions:
  contents: read

on: [push]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      image: "${{ steps.docker-push.outputs.image }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Sett opp og installer frontend avhengigheter
        uses: ./.github/actions/setup-frontend

      - run: |
          pnpm run typecheck && pnpm run build

      - name: Fjern dev dependencies
        run: pnpm prune --prod

      - uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        if: github.ref == 'refs/heads/main'
        id: docker-push
        with:
          team: teampensjon
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          build_args: GITHUB_SHA=${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main'

    needs: [ci, build]

    runs-on: 'ubuntu-latest'

    permissions:
      contents: "read"
      id-token: "write"

    strategy:
      matrix:
        include:
          - name: pensjon-verdande
            cluster: prod-gcp
            vars: .nais/vars-prod.yaml

          - name: pensjon-verdande-q0
            cluster: dev-gcp
            vars: .nais/vars-dev-q0.yaml

          - name: pensjon-verdande-q1
            cluster: dev-gcp
            vars: .nais/vars-dev-q1.yaml

          - name: pensjon-verdande-q2
            cluster: dev-gcp
            vars: .nais/vars-dev-q2.yaml

          - name: pensjon-verdande-q5
            cluster: dev-gcp
            vars: .nais/vars-dev-q5.yaml

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        name: 'Deploy to NAIS'
        env:
          IMAGE: "${{ needs.build.outputs.image }}"
          RESOURCE: .nais/nais.yaml
          CLUSTER: '${{ matrix.cluster }}'
          VARS: ${{matrix.vars}}

  deployPages:
    if: github.ref == 'refs/heads/main'

    needs: [ci]

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: 'pages'
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Sett opp og installer frontend avhengigheter
        uses: ./.github/actions/setup-frontend

      - name: Build Storybook
        run: pnpm run typecheck && pnpm run build && pnpm run build-storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'storybook-static'
          overwrite: true

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          token: ${{ github.token }}
