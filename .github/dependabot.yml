version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      aksel:
        applies-to: version-updates
        patterns:
          - "@navikt/aksel*"
          - "@navikt/ds*"
      react-router:
        applies-to: version-updates
        patterns:
          - "@react-router*"
          - "react-router"
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
