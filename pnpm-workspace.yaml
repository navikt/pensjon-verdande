# Pakker må være minst 7 dager gamle før de lastes ned
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@navikt/*"
  - "react-router@7.16.0"
  - "@react-router/node@7.16.0"
  - "@react-router/serve@7.16.0"
  - "@react-router/dev@7.16.0"
  - "@react-router/express@7.16.0"
allowBuilds:
  esbuild: false
  lefthook: true
